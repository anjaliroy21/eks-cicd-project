
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insurance
  template:
    metadata:
      labels:
        app: insurance
    spec:
      containers:
      - name: insurance-container
        image: ravipratapgiri/paymentservice:v1
        ports:
        - containerPort: 5010
